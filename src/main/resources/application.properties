spring.datasource.url=jdbc:mysql://localhost:3306/quizapp?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=7548
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Forces Hibernate to recreate tables to match Java code exactly
spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=true

# MUST HAVE for Spring Boot 3 + data.sql
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always
server.port=8082